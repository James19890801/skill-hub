<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI流程Skills市场 - 基于华为流程体系 · 520+ MCP服务器与AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px 20px;
            text-align: center;
        }
        .header h1 { font-size: 42px; margin-bottom: 10px; font-weight: 700; }
        .header .subtitle { font-size: 18px; opacity: 0.95; margin-bottom: 20px; }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            display: block;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .search-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        .search-box input:focus { border-color: #667eea; }
        .domain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .domain-card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        .domain-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
            border-color: #667eea;
        }
        .domain-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }
        .domain-card h3 {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .domain-card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
        }
        .skill-count {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .skill-list {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .skill-list.active { display: block; }
        .skill-item {
            border-bottom: 1px solid #f0f0f0;
            padding: 20px 0;
        }
        .skill-item:last-child { border-bottom: none; }
        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .skill-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .skill-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        .install-box {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .install-cmd {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            color: #389e0d;
        }
        .copy-btn {
            background: #52c41a;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .copy-btn:hover { background: #389e0d; }
        .back-btn {
            background: #f0f0f0;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .back-btn:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 AI流程Skills市场</h1>
        <p class="subtitle">基于华为业务流程体系 (IPD·LTC·ITR·HR·财经·战略) · 专业MCP服务器与AI Agent资源库</p>
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-number" id="totalSkills">520+</span>
                <span class="stat-label">Skills</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="totalDomains">8</span>
                <span class="stat-label">流程域</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="totalSources">GitHub</span>
                <span class="stat-label">数据来源</span>
            </div>
        </div>
        <div style="margin-top: 20px;">
            <a href="https://github.com/James19890801/ai-process-skills-market" target="_blank" style="color: white; text-decoration: underline; font-size: 14px;">📦 GitHub仓库</a>
            <span style="color: white; margin: 0 10px;">|</span>
            <span style="color: white; font-size: 14px;">最后更新: 2026-03-26</span>
        </div>
    </div>

    <div class="container">
        <div class="search-box">
            <input type="text" placeholder="🔍 搜索流程域、Skill名称或关键词..." id="searchInput">
        </div>

        <div class="domain-grid" id="domainGrid">
            <!-- 流程域卡片将由JS动态生成 -->
        </div>

        <div class="skill-list" id="skillList">
            <button class="back-btn" onclick="showDomains()">← 返回流程域</button>
            <h2 id="currentDomain"></h2>
            <div id="skillsContainer"></div>
        </div>
    </div>

    <script>
        // 流程域定义
        const domainConfig = {
            ipd: { name: 'IPD集成产品开发', icon: '🚀', desc: '产品管理、需求分析、研发管理、项目管理', color: '#667eea' },
            ltc: { name: 'LTC线索到现金', icon: '💰', desc: '销售管理、营销自动化、客户管理、合同管理', color: '#f093fb' },
            itr: { name: 'ITR问题到解决', icon: '🔧', desc: '客户服务、工单管理、售后支持、技术支持', color: '#4facfe' },
            hr: { name: '人力资源管理', icon: '👥', desc: '招聘、培训、绩效、薪酬、员工管理', color: '#43e97b' },
            finance: { name: '财经管理', icon: '💹', desc: '财务、会计、预算、成本、资金管理', color: '#fa709a' },
            strategy: { name: '战略管理', icon: '🎯', desc: '战略规划、竞争分析、市场研究、投资决策', color: '#feca57' },
            general: { name: '通用工具', icon: '🛠️', desc: '开发工具、协作工具、自动化工具、AI Agent', color: '#48dbfb' },
            mcp: { name: 'MCP服务器', icon: '🔌', desc: 'Model Context Protocol服务器、AI工具集成', color: '#ff9ff3' }
        };

        let skillsData = [];
        let domains = [];

        // 加载Skills数据
        async function loadSkillsData() {
            try {
                const response = await fetch('skills-database.json');
                const data = await response.json();
                skillsData = data.skills || [];
                
                // 按分类组织数据
                const grouped = {};
                Object.keys(domainConfig).forEach(key => {
                    grouped[key] = [];
                });
                
                skillsData.forEach(skill => {
                    if (grouped[skill.category]) {
                        grouped[skill.category].push(skill);
                    }
                });
                
                // 构建domains数组
                domains = Object.keys(domainConfig).map(key => ({
                    id: key,
                    ...domainConfig[key],
                    skills: grouped[key] || []
                }));
                
                renderDomains();
            } catch (error) {
                console.error('加载Skills数据失败:', error);
                document.getElementById('domainGrid').innerHTML = 
                    '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#999;">加载数据失败，请刷新页面重试</div>';
            }
        }

        function showDomains() {
            document.getElementById('domainGrid').style.display = 'grid';
            document.getElementById('skillList').classList.remove('active');
        }

        function showSkills(domainId) {
            const domain = domains.find(d => d.id === domainId);
            if (!domain) return;

            document.getElementById('domainGrid').style.display = 'none';
            document.getElementById('skillList').classList.add('active');
            document.getElementById('currentDomain').textContent = domain.icon + ' ' + domain.name + ' (' + domain.skills.length + ')';

            const container = document.getElementById('skillsContainer');
            if (domain.skills.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:#999;">暂无Skills数据</div>';
                return;
            }
            
            container.innerHTML = domain.skills.map(skill => `
                <div class="skill-item">
                    <div class="skill-header">
                        <span class="skill-name">${skill.name}</span>
                        <small style="color:#999;font-size:12px;">⭐ ${skill.stars || 0} · ${skill.language || 'Unknown'}</small>
                    </div>
                    <div class="skill-desc">${skill.description}</div>
                    <div style="margin-bottom: 10px;">
                        <small style="color:#667eea;">🏷️ ${(skill.tags || []).join(', ')}</small>
                    </div>
                    <div class="install-box">
                        <code class="install-cmd">${skill.install || 'npm install ' + skill.id}</code>
                        <button class="copy-btn" onclick="copyCmd('${skill.install || 'npm install ' + skill.id}')">复制</button>
                    </div>
                    <div style="margin-top: 10px;">
                        <a href="${skill.url}" target="_blank" style="color:#667eea; font-size:13px; text-decoration:none;">🔗 查看GitHub仓库</a>
                    </div>
                </div>
            `).join('');
        }

        function copyCmd(cmd) {
            navigator.clipboard.writeText(cmd).then(() => {
                alert('命令已复制，粘贴到终端即可安装');
            });
        }

        function renderDomains() {
            const grid = document.getElementById('domainGrid');
            grid.innerHTML = domains.map(domain => `
                <div class="domain-card" onclick="showSkills('${domain.id}')" style="border-top: 4px solid ${domain.color}">
                    <div class="domain-icon">${domain.icon}</div>
                    <h3>${domain.name}</h3>
                    <p>${domain.desc}</p>
                    <span class="skill-count" style="background: ${domain.color}">${domain.skills.length} 个Skill</span>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            if (!keyword) {
                renderDomains();
                return;
            }
            
            // 搜索所有匹配的skills
            const results = [];
            domains.forEach(domain => {
                domain.skills.forEach(skill => {
                    if (skill.name.toLowerCase().includes(keyword) || 
                        (skill.description && skill.description.toLowerCase().includes(keyword)) ||
                        (skill.tags && skill.tags.some(tag => tag.toLowerCase().includes(keyword)))) {
                        results.push({...skill, domainName: domain.name, domainId: domain.id});
                    }
                });
            });
            
            if (results.length > 0) {
                const grid = document.getElementById('domainGrid');
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; margin-bottom: 20px;">
                        <h3 style="color:#667eea;">找到 ${results.length} 个匹配的Skill</h3>
                        <button class="back-btn" onclick="renderDomains()" style="margin-top: 10px;">清除搜索</button>
                    </div>
                    ${results.map(skill => `
                        <div class="domain-card" onclick="showSkills('${skill.domainId}')">
                            <h3>${skill.name}</h3>
                            <p>${skill.description ? skill.description.substring(0, 80) + '...' : ''}</p>
                            <small style="color:#999;">${skill.domainName} · ⭐ ${skill.stars || 0}</small>
                        </div>
                    `).join('')}
                `;
            } else {
                const grid = document.getElementById('domainGrid');
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align:center; padding:40px; color:#999;">
                        未找到匹配的Skill
                        <br><br>
                        <button class="back-btn" onclick="renderDomains()">清除搜索</button>
                    </div>
                `;
            }
        });

        // 页面加载时获取数据
        loadSkillsData();
    </script>
</body>
</html>
