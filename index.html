<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CQ市场 - 基于流程体系的Skill Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 { font-size: 36px; margin-bottom: 10px; }
        .header p { font-size: 16px; opacity: 0.9; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .search-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        .search-box input:focus { border-color: #667eea; }
        .domain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .domain-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .domain-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            border-color: #667eea;
        }
        .domain-card h3 {
            font-size: 18px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .domain-card p {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
        }
        .skill-count {
            display: inline-block;
            background: #f0f8ff;
            color: #1890ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .skill-list {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .skill-list.active { display: block; }
        .skill-item {
            border-bottom: 1px solid #f0f0f0;
            padding: 20px 0;
        }
        .skill-item:last-child { border-bottom: none; }
        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .skill-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .skill-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        .install-box {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .install-cmd {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            color: #389e0d;
        }
        .copy-btn {
            background: #52c41a;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .copy-btn:hover { background: #389e0d; }
        .back-btn {
            background: #f0f0f0;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .back-btn:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>CQ市场</h1>
        <p>基于流程体系的Skill Hub · 面向价值流的AI能力市场</p>
    </div>

    <div class="container">
        <div class="search-box">
            <input type="text" placeholder="搜索流程域、Skill名称或关键词..." id="searchInput">
        </div>

        <div class="domain-grid" id="domainGrid">
            <!-- 流程域卡片将由JS动态生成 -->
        </div>

        <div class="skill-list" id="skillList">
            <button class="back-btn" onclick="showDomains()">← 返回流程域</button>
            <h2 id="currentDomain"></h2>
            <div id="skillsContainer"></div>
        </div>
    </div>

    <script>
        const domains = [
            {
                id: 'ipd',
                name: 'IPD集成产品开发',
                desc: '从需求到上市的全流程研发管理',
                skills: [
                    { name: '需求分析助手', desc: '自动分析用户需求，输出PRD文档结构', cmd: 'qoder skill install ipd-requirement-analyzer' },
                    { name: '技术方案评审', desc: '基于历史案例评估技术方案可行性', cmd: 'qoder skill install ipd-tech-review' },
                    { name: '项目风险评估', desc: '识别研发项目中的潜在风险点', cmd: 'qoder skill install ipd-risk-assessment' }
                ]
            },
            {
                id: 'supply-chain',
                name: '供应链管理',
                desc: '采购、库存、物流全流程优化',
                skills: [
                    { name: '供应商评估', desc: '多维度评估供应商资质与风险', cmd: 'qoder skill install scm-supplier-eval' },
                    { name: '库存预警分析', desc: '智能预测库存短缺与积压风险', cmd: 'qoder skill install scm-inventory-alert' },
                    { name: '采购合同审查', desc: '自动识别采购合同中的风险条款', cmd: 'qoder skill install scm-contract-review' }
                ]
            },
            {
                id: 'hr',
                name: '人力资源',
                desc: '招聘、培训、绩效全模块覆盖',
                skills: [
                    { name: '简历智能筛选', desc: '基于JD自动筛选匹配简历', cmd: 'qoder skill install hr-resume-screening' },
                    { name: '面试问题生成', desc: '根据岗位生成结构化面试题', cmd: 'qoder skill install hr-interview-questions' },
                    { name: '员工离职预警', desc: '分析员工行为数据预测离职风险', cmd: 'qoder skill install hr-turnover-prediction' }
                ]
            },
            {
                id: 'finance',
                name: '财务管控',
                desc: '预算、报销、核算全流程',
                skills: [
                    { name: '费用报销审核', desc: '自动审核报销单据合规性', cmd: 'qoder skill install finance-expense-review' },
                    { name: '预算执行分析', desc: '实时监控预算执行情况', cmd: 'qoder skill install finance-budget-analysis' },
                    { name: '合同财务条款审查', desc: '识别合同中的财务风险点', cmd: 'qoder skill install finance-contract-review' }
                ]
            },
            {
                id: 'marketing',
                name: '市场营销',
                desc: '品牌、活动、获客全链路',
                skills: [
                    { name: '营销文案生成', desc: '基于产品卖点生成营销文案', cmd: 'qoder skill install mkt-copywriting' },
                    { name: '竞品分析报告', desc: '自动收集分析竞品信息', cmd: 'qoder skill install mkt-competitor-analysis' },
                    { name: '活动方案策划', desc: '生成完整的营销活动策划案', cmd: 'qoder skill install mkt-event-planning' }
                ]
            },
            {
                id: 'legal',
                name: '法务合规',
                desc: '合同、诉讼、知识产权管理',
                skills: [
                    { name: '合同风险识别', desc: '自动识别各类合同风险条款', cmd: 'qoder skill install legal-risk-detection' },
                    { name: '法律条文检索', desc: '快速检索相关法律法规', cmd: 'qoder skill install legal-clause-search' },
                    { name: '诉讼材料整理', desc: '自动整理诉讼案件材料', cmd: 'qoder skill install legal-litigation-prep' }
                ]
            }
        ];

        function showDomains() {
            document.getElementById('domainGrid').style.display = 'grid';
            document.getElementById('skillList').classList.remove('active');
        }

        function showSkills(domainId) {
            const domain = domains.find(d => d.id === domainId);
            if (!domain) return;

            document.getElementById('domainGrid').style.display = 'none';
            document.getElementById('skillList').classList.add('active');
            document.getElementById('currentDomain').textContent = domain.name;

            const container = document.getElementById('skillsContainer');
            container.innerHTML = domain.skills.map(skill => `
                <div class="skill-item">
                    <div class="skill-header">
                        <span class="skill-name">${skill.name}</span>
                    </div>
                    <div class="skill-desc">${skill.desc}</div>
                    <div class="install-box">
                        <code class="install-cmd">${skill.cmd}</code>
                        <button class="copy-btn" onclick="copyCmd('${skill.cmd}')">复制</button>
                    </div>
                </div>
            `).join('');
        }

        function copyCmd(cmd) {
            navigator.clipboard.writeText(cmd).then(() => {
                alert('命令已复制，粘贴到终端即可安装');
            });
        }

        function renderDomains() {
            const grid = document.getElementById('domainGrid');
            grid.innerHTML = domains.map(domain => `
                <div class="domain-card" onclick="showSkills('${domain.id}')">
                    <h3>${domain.name}</h3>
                    <p>${domain.desc}</p>
                    <span class="skill-count">${domain.skills.length} 个Skill</span>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            if (!keyword) {
                renderDomains();
                return;
            }
            
            const filtered = domains.filter(d => 
                d.name.toLowerCase().includes(keyword) ||
                d.desc.toLowerCase().includes(keyword) ||
                d.skills.some(s => s.name.toLowerCase().includes(keyword))
            );
            
            const grid = document.getElementById('domainGrid');
            grid.innerHTML = filtered.map(domain => `
                <div class="domain-card" onclick="showSkills('${domain.id}')">
                    <h3>${domain.name}</h3>
                    <p>${domain.desc}</p>
                    <span class="skill-count">${domain.skills.length} 个Skill</span>
                </div>
            `).join('');
        });

        renderDomains();
    </script>
</body>
</html>
